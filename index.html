<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Road to 13.1</title>
<style>
  :root{
    --navy:#232D4B;        /* deep navy */
    --orange:#E57200;      /* orange */
    --navy-soft:#2e3a5e;
    --bg:#f4f6fa;
    --card:#ffffff;
    --ink:#1d2435;
    --muted:#6b7280;
    --line:#e3e8f0;
    --good:#2e9e5b;
    --warn:#d9822b;
    --bad:#c0392b;
    --radius:14px;
    --shadow:0 2px 10px rgba(35,45,75,.08);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.45}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:14px}
  .hidden{display:none !important}

  /* ---------- LOGIN ---------- */
  #loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,#232D4B 0%,#2e3a5e 60%,#1b2238 100%);padding:20px}
  .login-card{background:var(--card);width:100%;max-width:400px;border-radius:18px;padding:34px 30px;box-shadow:0 18px 50px rgba(0,0,0,.35)}
  .brand{display:flex;flex-direction:column;align-items:center;margin-bottom:22px}
  .brand .logo{width:64px;height:64px;border-radius:16px;background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:26px;letter-spacing:1px;border:3px solid var(--orange)}
  .brand h1{font-size:20px;margin-top:12px;color:var(--navy);text-align:center}
  .brand p{font-size:13px;color:#6b7280;margin-top:3px}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:12.5px;font-weight:600;color:#475069;margin-bottom:5px}
  .field input,.field select,.field textarea{width:100%;padding:11px 12px;border:1.5px solid var(--line);border-radius:10px;outline:none;transition:border .15s}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--orange)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border:none;border-radius:10px;padding:11px 16px;font-weight:700;font-size:14px}
  .btn-primary{background:var(--orange);color:#fff;width:100%}
  .btn-primary:hover{background:#cf6600}
  .btn-navy{background:var(--navy);color:#fff}
  .btn-navy:hover{background:#2e3a5e}
  .btn-ghost{background:transparent;color:var(--navy);border:1.5px solid var(--line)}
  .btn-ghost:hover{border-color:var(--navy)}
  .btn-sm{padding:7px 11px;font-size:12.5px;border-radius:8px}
  .btn-danger{background:#fff;color:var(--bad);border:1.5px solid #f0c6c0}
  .btn-danger:hover{background:#fdf1ef}
  .link{color:var(--orange);font-weight:600;cursor:pointer;font-size:13px;background:none;border:none}
  .login-toggle{text-align:center;margin-top:16px;font-size:13px;color:#6b7280}
  .msg{font-size:13px;padding:9px 11px;border-radius:8px;margin-bottom:12px}
  .msg.err{background:#fdecea;color:#b13728;border:1px solid #f5c6c0}
  .msg.ok{background:#eaf7ef;color:#216e3c;border:1px solid #bfe3cc}

  /* ---------- APP SHELL ---------- */
  header.topbar{background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:12px 20px;position:sticky;top:0;z-index:30;box-shadow:0 2px 8px rgba(0,0,0,.2)}
  .topbar .left{display:flex;align-items:center;gap:12px}
  .topbar .logo-sm{width:38px;height:38px;border-radius:10px;background:#fff;color:var(--navy);display:flex;align-items:center;justify-content:center;font-weight:800;border:2px solid var(--orange);font-size:20px}
  .topbar h2{font-size:16px;font-weight:700}
  .topbar .who{font-size:12.5px;color:#c6cde0}
  .topbar .right{display:flex;align-items:center;gap:10px}
  .pill{background:var(--orange);color:#fff;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;text-transform:uppercase;letter-spacing:.5px}
  .pill.athlete{background:#4a6bd6}

  nav.tabs{background:#fff;border-bottom:1px solid var(--line);display:flex;gap:2px;padding:0 14px;overflow-x:auto;position:sticky;top:62px;z-index:20}
  nav.tabs button{background:none;border:none;padding:14px 16px;font-size:14px;font-weight:600;color:#6b7280;border-bottom:3px solid transparent;white-space:nowrap}
  nav.tabs button.active{color:var(--navy);border-bottom-color:var(--orange)}
  nav.tabs button:hover{color:var(--navy)}

  main{max-width:1080px;margin:0 auto;padding:22px 18px 60px}
  .page-title{font-size:22px;color:var(--navy);font-weight:800;margin-bottom:4px}
  .page-sub{color:#6b7280;font-size:13.5px;margin-bottom:20px}

  .grid{display:grid;gap:16px}
  .cards-4{grid-template-columns:repeat(4,1fr)}
  .cards-3{grid-template-columns:repeat(3,1fr)}
  .cards-2{grid-template-columns:repeat(2,1fr)}
  @media(max-width:820px){.cards-4{grid-template-columns:repeat(2,1fr)}.cards-3,.cards-2{grid-template-columns:1fr}}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow)}
  .card h3{font-size:14px;color:var(--navy);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
  .stat .label{font-size:12px;color:#6b7280;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
  .stat .value{font-size:28px;font-weight:800;color:var(--navy);margin-top:4px}
  .stat .unit{font-size:13px;color:#6b7280;font-weight:600}
  .stat .trend{font-size:12px;margin-top:4px;font-weight:600}
  .up{color:var(--good)} .down{color:var(--bad)}

  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th{text-align:left;color:#6b7280;font-weight:700;font-size:11.5px;text-transform:uppercase;letter-spacing:.4px;padding:9px 10px;border-bottom:2px solid var(--line)}
  td{padding:10px;border-bottom:1px solid var(--line);vertical-align:top}
  tr:hover td{background:#f8faff}
  .tag{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px}
  .t-Easy{background:#e7f0ff;color:#2c5bc4}
  .t-Workout{background:#ffe9d6;color:#b35e00}
  .t-Long{background:#ede4ff;color:#6b3fd1}
  .t-Race{background:#ffe0e0;color:#c0392b}
  .t-Recovery{background:#e3f7ec;color:#218a4e}
  .t-Cross{background:#e6f6f8;color:#1f7f8c}
  .t-Rest{background:#eef0f4;color:#5b6478}

  .chart-wrap{height:200px;display:flex;align-items:flex-end;gap:8px;padding-top:10px}
  .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%}
  .bar-track{flex:1;width:100%;display:flex;align-items:flex-end}
  .bar{width:70%;margin:0 auto;background:linear-gradient(180deg,var(--orange),#f2974a);border-radius:6px 6px 0 0;min-height:2px;transition:height .3s;position:relative}
  .bar.cur{background:linear-gradient(180deg,var(--navy),#46568a)}
  .bar-val{font-size:11px;font-weight:700;color:var(--navy)}
  .bar-lbl{font-size:10.5px;color:#6b7280;text-align:center;line-height:1.2}

  .row-form{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
  @media(max-width:700px){.row-form{grid-template-columns:1fr 1fr}}
  .full{grid-column:1/-1}
  .form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:6px}

  .empty{text-align:center;color:#9aa3b5;padding:30px;font-size:14px}
  .comment{background:#f8faff;border-left:3px solid var(--orange);padding:9px 12px;border-radius:0 8px 8px 0;margin-top:8px;font-size:13px}
  .comment .meta{font-size:11px;color:#6b7280;font-weight:600;margin-bottom:2px}
  .feel-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:4px}

  /* modal */
  .modal-bg{position:fixed;inset:0;background:rgba(20,26,45,.55);display:flex;align-items:center;justify-content:center;z-index:50;padding:18px}
  .modal{background:#fff;border-radius:16px;max-width:560px;width:100%;max-height:90vh;overflow:auto;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.4)}
  .modal h3{color:var(--navy);font-size:18px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
  .x{background:none;border:none;font-size:22px;color:#9aa3b5;cursor:pointer;line-height:1}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:12px 20px;border-radius:10px;font-size:13.5px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.3);z-index:80;opacity:0;transition:opacity .25s,transform .25s}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
  .athlete-select{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:18px}
  .ath-chip{background:#fff;border:1.5px solid var(--line);border-radius:30px;padding:7px 15px;font-size:13px;font-weight:600;color:#475069}
  .ath-chip.active{background:var(--navy);color:#fff;border-color:var(--navy)}
  .progress{height:9px;background:#eef0f4;border-radius:6px;overflow:hidden;margin-top:8px}
  .progress > span{display:block;height:100%;background:linear-gradient(90deg,var(--orange),#f2a45a);border-radius:6px}
  .help{font-size:11.5px;color:#9aa3b5;margin-top:3px}
  .inline-actions{display:flex;gap:6px}
  .week-head{display:flex;justify-content:space-between;align-items:center;margin:18px 0 8px;color:var(--navy);font-weight:700;font-size:14px}
</style>
</head>
<body>

<!-- ================= LOGIN ================= -->
<div id="loginScreen">
  <div class="login-card">
    <div class="brand">
      <div class="logo">🐡</div>
      <h1>Road to 13.1</h1>
      <p>Run smart. Track every mile. Chase the half.</p>
    </div>
    <div id="loginMsg"></div>

    <!-- Sign in -->
    <div id="signinForm">
      <div class="field"><label>Username</label><input id="li_user" autocomplete="username" placeholder="username"></div>
      <div class="field"><label>Password</label><input id="li_pass" type="password" autocomplete="current-password" placeholder="••••••••"></div>
      <button class="btn btn-primary" onclick="doLogin()">Sign In</button>
      <div class="login-toggle">New athlete? <button class="link" onclick="showRegister(true)">Create an account</button></div>
    </div>

    <!-- Register -->
    <div id="registerForm" class="hidden">
      <div class="field"><label>Full name</label><input id="rg_name" placeholder="Jane Doe"></div>
      <div class="field"><label>Username</label><input id="rg_user" placeholder="choose a username"></div>
      <div class="field"><label>Password</label><input id="rg_pass" type="password" placeholder="choose a password"></div>
      <button class="btn btn-primary" onclick="doRegister()">Create Account</button>
      <div class="login-toggle">Already have an account? <button class="link" onclick="showRegister(false)">Sign in</button></div>
    </div>
  </div>
</div>

<!-- ================= APP ================= -->
<div id="app" class="hidden">
  <header class="topbar">
    <div class="left">
      <div class="logo-sm">🐡</div>
      <div>
        <h2>Road to 13.1</h2>
        <div class="who" id="whoBar"></div>
      </div>
    </div>
    <div class="right">
      <span class="pill" id="rolePill">Athlete</span>
      <button class="btn btn-ghost btn-sm" style="color:#fff;border-color:#46568a" onclick="logout()">Sign Out</button>
    </div>
  </header>

  <nav class="tabs" id="tabBar"></nav>
  <main id="view"></main>
</div>

<div id="modalRoot"></div>
<div id="toast" class="toast"></div>

<script>
/* ============================================================
   CONFIG  —  shared cloud sync
   To let two people share data, paste your free Firebase Realtime
   Database URL between the quotes below (see the setup guide).
   Leave it blank to run locally on this one device.
============================================================ */
const CLOUD_URL = "https://running-training-log-6f0e9-default-rtdb.firebaseio.com";

/* ============================================================
   DATA LAYER  (in-memory STATE, mirrored to localStorage + cloud)
============================================================ */
const KEY={users:'users',entries:'entries',goals:'goals',workouts:'workouts',comments:'comments'};
const LS='roadto131_state', LS_SESSION='roadto131_session';
let STATE={users:[],entries:[],goals:{},workouts:[],comments:[]};
let SESSION=null; // {username,role,name}

const DB = {
  get(k,def){ const v=STATE[k]; return (v===undefined||v===null)?def:v; },
  set(k,v){ STATE[k]=v; persistLocal(); pushCloud(); }
};
function shaped(d){return {users:(d&&d.users)||[],entries:(d&&d.entries)||[],goals:(d&&d.goals)||{},workouts:(d&&d.workouts)||[],comments:(d&&d.comments)||[]};}
function persistLocal(){ try{localStorage.setItem(LS,JSON.stringify(STATE))}catch(e){} }
function adoptState(d){ STATE=shaped(d); persistLocal(); }

/* ---- cloud (Firebase Realtime DB REST) ---- */
function cloudOn(){ return /^https?:\/\//.test(CLOUD_URL); }
function cloudEndpoint(){ return CLOUD_URL.replace(/\/+$/,'')+'/roadto131.json'; }
let pushTimer=null;
function pushCloud(){
  if(!cloudOn()) return;
  clearTimeout(pushTimer);
  pushTimer=setTimeout(()=>{
    fetch(cloudEndpoint(),{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(STATE)})
      .catch(e=>console.warn('cloud push failed',e));
  },400);
}
async function pullCloud(){
  if(!cloudOn()) return null;
  try{ const r=await fetch(cloudEndpoint(),{cache:'no-store'}); if(!r.ok) return null; return await r.json(); }
  catch(e){ console.warn('cloud pull failed',e); return null; }
}
// near-realtime: pull every 12s and re-render read-only views if data changed
const SAFE_REFRESH=new Set(['dashboard','history','calendar','roster','athlete','users']);
function startSync(){
  if(!cloudOn()) return;
  setInterval(async()=>{
    const d=await pullCloud(); if(!d) return;
    const ns=shaped(d);
    if(JSON.stringify(ns)!==JSON.stringify(STATE)){
      STATE=ns; persistLocal();
      if(SESSION && !el('modalRoot').innerHTML && SAFE_REFRESH.has(CURRENT)) go(CURRENT);
    }
  },12000);
}

/* ---- password hashing ---- */
async function sha(text){
  try{
    const buf=await crypto.subtle.digest('SHA-256', new TextEncoder().encode('rt131:'+text));
    return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join('');
  }catch(e){ // fallback for rare non-secure contexts
    let h=2166136261; const s='rt131:'+text;
    for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619)}
    return 'fb'+(h>>>0).toString(16);
  }
}
async function migratePasswords(){
  let changed=false;
  for(const u of STATE.users){ if(u.password && !u.pass){ u.pass=await sha(u.password); delete u.password; changed=true; } }
  if(changed){ persistLocal(); pushCloud(); }
}
async function ensureSeed(){
  if(!STATE.users || STATE.users.length===0){
    STATE.users=[{username:'eric', pass:await sha('gohoos'), name:'Eric (Coach)', role:'admin'}];
    persistLocal(); pushCloud();
  }
}

/* ============================================================
   AUTH
============================================================ */
function showRegister(show){
  document.getElementById('signinForm').classList.toggle('hidden',show);
  document.getElementById('registerForm').classList.toggle('hidden',!show);
  loginMsg('');
}
function loginMsg(t,type){ const e=document.getElementById('loginMsg'); e.innerHTML=t?`<div class="msg ${type||'err'}">${t}</div>`:''; }

async function doLogin(){
  const u=val('li_user').trim(), p=val('li_pass');
  if(!u||!p){loginMsg('Enter username and password.');return;}
  if(cloudOn()){ const d=await pullCloud(); if(d) adoptState(d); }
  const user=DB.get(KEY.users,[]).find(x=>x.username.toLowerCase()===u.toLowerCase());
  const ph=await sha(p);
  if(!user||user.pass!==ph){loginMsg('Incorrect username or password.');return;}
  SESSION={username:user.username,role:user.role,name:user.name};
  try{localStorage.setItem(LS_SESSION,JSON.stringify(SESSION))}catch(e){}
  enterApp();
}
async function doRegister(){
  const name=val('rg_name').trim(), u=val('rg_user').trim(), p=val('rg_pass');
  if(!name||!u||!p){loginMsg('Fill in all fields.');return;}
  if(cloudOn()){ const d=await pullCloud(); if(d) adoptState(d); }
  const users=DB.get(KEY.users,[]);
  if(users.some(x=>x.username.toLowerCase()===u.toLowerCase())){loginMsg('That username is taken.');return;}
  users.push({username:u,pass:await sha(p),name:name,role:'athlete'});
  DB.set(KEY.users,users);
  loginMsg('Account created! You can sign in now.','ok');
  showRegister(false);
  document.getElementById('li_user').value=u;
}
function logout(){ try{localStorage.removeItem(LS_SESSION)}catch(e){} SESSION=null; location.reload(); }

function enterApp(){
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('whoBar').textContent=SESSION.name+' · @'+SESSION.username;
  const pill=document.getElementById('rolePill');
  pill.textContent=SESSION.role==='admin'?'Coach / Admin':'Athlete';
  pill.className='pill'+(SESSION.role==='athlete'?' athlete':'');
  buildTabs();
  go(SESSION.role==='admin'?'roster':'dashboard');
}

/* ============================================================
   HELPERS
============================================================ */
function val(id){return document.getElementById(id).value}
function el(id){return document.getElementById(id)}
function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function toast(t){const e=el('toast');e.textContent=t;e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2200)}

function fmtDate(d){const dt=new Date(d+'T00:00:00');return dt.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}
function todayStr(){return new Date().toISOString().slice(0,10)}
// Monday-start week key
function weekStart(dateStr){const d=new Date(dateStr+'T00:00:00');const day=(d.getDay()+6)%7;d.setDate(d.getDate()-day);return d.toISOString().slice(0,10)}
function weekLabel(ws){const d=new Date(ws+'T00:00:00');return d.toLocaleDateString('en-US',{month:'short',day:'numeric'})}
function paceFrom(distance,unit,secs){
  if(!distance||!secs) return '—';
  const miles=unit==='km'?distance*0.621371:distance;
  if(miles<=0) return '—';
  const per=secs/miles; const m=Math.floor(per/60), s=Math.round(per%60);
  return `${m}:${String(s).padStart(2,'0')}/mi`;
}
function secsToHMS(secs){if(!secs)return '—';const h=Math.floor(secs/3600),m=Math.floor((secs%3600)/60),s=secs%60;return (h?h+':':'')+(h?String(m).padStart(2,'0'):m)+':'+String(s).padStart(2,'0')}
function parseDur(h,m,s){return (+h||0)*3600+(+m||0)*60+(+s||0)}
function toMiles(d,unit){return unit==='km'?d*0.621371:d}

/* data accessors */
function entriesOf(user){return DB.get(KEY.entries,[]).filter(e=>e.user===user).sort((a,b)=>b.date.localeCompare(a.date))}
function allEntries(){return DB.get(KEY.entries,[])}
function goalsOf(user){return DB.get(KEY.goals,{})[user]||{weekly:0,season:'',races:''}}
function setGoals(user,g){const all=DB.get(KEY.goals,{});all[user]=g;DB.set(KEY.goals,all)}
function commentsOf(entryId){return DB.get(KEY.comments,[]).filter(c=>c.entryId===entryId)}
function workoutsOf(user){return DB.get(KEY.workouts,[]).filter(w=>w.athlete===user).sort((a,b)=>a.date.localeCompare(b.date))}
function athletes(){return DB.get(KEY.users,[]).filter(u=>u.role==='athlete')}

/* ============================================================
   TABS / ROUTER
============================================================ */
let CURRENT='dashboard';
let ADMIN_VIEW_USER=null; // which athlete admin is inspecting

const ATHLETE_TABS=[['dashboard','Dashboard'],['log','Log a Run'],['history','History'],['calendar','Calendar'],['goals','Goals']];
const ADMIN_TABS=[['roster','Roster'],['athlete','Athlete View'],['assign','Assign Workout'],['users','Manage Users']];

function buildTabs(){
  const bar=el('tabBar');bar.innerHTML='';
  const tabs=SESSION.role==='admin'?ADMIN_TABS:ATHLETE_TABS;
  tabs.forEach(([id,label])=>{
    const b=document.createElement('button');b.textContent=label;b.dataset.tab=id;
    b.onclick=()=>go(id);bar.appendChild(b);
  });
}
function go(tab){
  CURRENT=tab;
  [...el('tabBar').children].forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  const v=el('view');v.scrollTop=0;
  const r={
    dashboard:renderDashboard, log:renderLog, history:renderHistory, calendar:renderCalendar, goals:renderGoals,
    roster:renderRoster, athlete:renderAthleteView, assign:renderAssign, users:renderUsers
  }[tab];
  v.innerHTML=r?r():'<div class="empty">Not found</div>';
  if(r) r.after && r.after();
}

/* ============================================================
   ATHLETE: DASHBOARD
============================================================ */
function weeklyMileage(user,weeks){
  const es=entriesOf(user);
  const map={};
  es.forEach(e=>{const w=weekStart(e.date);map[w]=(map[w]||0)+toMiles(+e.distance||0,e.unit)});
  // build last N weeks ending current
  const out=[];let d=new Date(weekStart(todayStr())+'T00:00:00');
  for(let i=weeks-1;i>=0;i--){const ws=new Date(d);ws.setDate(d.getDate()-i*7);const k=ws.toISOString().slice(0,10);out.push({week:k,miles:map[k]||0})}
  return out;
}
function renderDashboard(){
  const user=SESSION.username;
  const es=entriesOf(user);
  const wk=weeklyMileage(user,8);
  const thisWk=wk[wk.length-1].miles, lastWk=wk[wk.length-2]?.miles||0;
  const goal=goalsOf(user).weekly||0;
  const totalMiles=es.reduce((s,e)=>s+toMiles(+e.distance||0,e.unit),0);
  const runDays=new Set(es.map(e=>e.date)).size;
  const upcoming=workoutsOf(user).filter(w=>w.date>=todayStr());
  const max=Math.max(1,...wk.map(w=>w.miles),goal);

  const trend=thisWk>=lastWk?`<span class="up">▲ ${(thisWk-lastWk).toFixed(1)} vs last wk</span>`:`<span class="down">▼ ${(lastWk-thisWk).toFixed(1)} vs last wk</span>`;
  const bars=wk.map((w,i)=>{
    const h=(w.miles/max*100);
    return `<div class="bar-col"><div class="bar-track"><div class="bar ${i===wk.length-1?'cur':''}" style="height:${h}%"></div></div>
      <div class="bar-val">${w.miles?w.miles.toFixed(0):''}</div><div class="bar-lbl">${weekLabel(w.week)}</div></div>`;
  }).join('');

  return `

  <div class="page-sub">Here's your training at a glance.</div>

  <div class="grid cards-4" style="margin-bottom:16px">
    <div class="card stat"><div class="label">This Week</div><div class="value">${thisWk.toFixed(1)} <span class="unit">mi</span></div><div class="trend">${trend}</div></div>
    <div class="card stat"><div class="label">Weekly Goal</div><div class="value">${goal?goal+' <span class="unit">mi</span>':'—'}</div>
      ${goal?`<div class="progress"><span style="width:${Math.min(100,thisWk/goal*100)}%"></span></div>`:'<div class="help">Set one in Goals</div>'}</div>
    <div class="card stat"><div class="label">Total Logged</div><div class="value">${totalMiles.toFixed(0)} <span class="unit">mi</span></div><div class="trend">${es.length} runs</div></div>
    <div class="card stat"><div class="label">Run Days</div><div class="value">${runDays}</div><div class="trend">unique days</div></div>
  </div>

  <div class="grid cards-2">
    <div class="card" style="grid-column:1/-1">
      <h3>Weekly Mileage — last 8 weeks</h3>
      <div class="chart-wrap">${bars}</div>
    </div>
  </div>

  <div class="grid cards-2" style="margin-top:16px">
    <div class="card">
      <h3>Recent Runs <button class="link" onclick="go('history')">View all →</button></h3>
      ${es.length?`<table><thead><tr><th>Date</th><th>Type</th><th>Dist</th><th>Pace</th></tr></thead><tbody>
        ${es.slice(0,6).map(e=>`<tr onclick="viewEntry('${e.id}')" style="cursor:pointer">
          <td>${fmtDate(e.date)}</td><td>${typeTag(e.type)}</td>
          <td>${(+e.distance||0)} ${e.unit}</td><td>${paceFrom(+e.distance,e.unit,e.dur)}</td></tr>`).join('')}
        </tbody></table>`:'<div class="empty">No runs yet. <button class="link" onclick="go(\'log\')">Log your first run →</button></div>'}
    </div>
    <div class="card">
      <h3>Assigned Workouts</h3>
      ${upcoming.length?upcoming.slice(0,5).map(w=>`<div class="comment"><div class="meta">${fmtDate(w.date)} · from ${esc(w.by)}</div>${esc(w.description)}</div>`).join(''):'<div class="empty">Nothing assigned right now.</div>'}
    </div>
  </div>`;
}

function saveEntry(editId){
  const dist=+val('f_dist');
  const entry={
    id:editId||uid(), user:SESSION.username,
    date:val('f_date'), type:val('f_type'), surface:val('f_surface'),
    distance:dist, unit:val('f_unit'),
    dur:parseDur(val('f_h'),val('f_m'),val('f_s')),
    shoes:val('f_shoes'), splits:val('f_splits'),
    rpe:val('f_rpe'), sleep:val('f_sleep'), sore:val('f_sore'), hr:val('f_hr'),
    feel:val('f_feel'), injury:val('f_injury'), notes:val('f_notes')
  };
  if(!entry.date){toast('Pick a date');return;}
  const all=allEntries();
  const i=all.findIndex(x=>x.id===entry.id);
  if(i>=0)all[i]=entry; else all.push(entry);
  DB.set(KEY.entries,all);
  toast(editId?'Run updated ✓':'Run logged ✓');
  go('history');
}
function deleteEntry(id){
  if(!confirm('Delete this run?'))return;
  DB.set(KEY.entries,allEntries().filter(e=>e.id!==id));
  DB.set(KEY.comments,DB.get(KEY.comments,[]).filter(c=>c.entryId!==id));
  toast('Run deleted');
  closeModal(); go(SESSION.role==='admin'?'athlete':'history');
}

function renderHistory(){
  const es=entriesOf(SESSION.username);
  return historyTable(es,SESSION.username,'Your Run History','Every session you\'ve logged.',true);

function historyTable(es,user,title,sub,canEdit,bare){
  if(!es.length) return (bare?'':`<div class="page-title">${title}</div><div class="page-sub">${sub}</div>`)+`<div class="card"><div class="empty">No runs logged yet.</div></div>`;
  // group by week
  const groups={};es.forEach(e=>{const w=weekStart(e.date);(groups[w]=groups[w]||[]).push(e)});
  const weeks=Object.keys(groups).sort((a,b)=>b.localeCompare(a));
  let html=bare?'':`<div class="page-title">${title}</div><div class="page-sub">${sub}</div>`;
  weeks.forEach(w=>{
    const list=groups[w];
    const miles=list.reduce((s,e)=>s+toMiles(+e.distance||0,e.unit),0);
    html+=`<div class="week-head"><span>Week of ${weekLabel(w)}</span><span>${miles.toFixed(1)} mi · ${list.length} runs</span></div>
    <div class="card" style="padding:0;overflow:hidden">
    <table><thead><tr><th>Date</th><th>Type</th><th>Dist</th><th>Time</th><th>Pace</th><th>RPE</th><th>Feel</th><th></th></tr></thead><tbody>
    ${list.map(e=>`<tr>
      <td>${fmtDate(e.date)}</td><td>${typeTag(e.type)}</td>
      <td>${(+e.distance||0)} ${e.unit}</td><td>${secsToHMS(e.dur)}</td>
      <td>${paceFrom(+e.distance,e.unit,e.dur)}</td><td>${e.rpe||'—'}</td><td>${feelDot(e.feel)}${esc(e.feel||'')}</td>
      <td class="inline-actions">
        <button class="btn btn-ghost btn-sm" onclick="viewEntry('${e.id}')">View</button>
        ${canEdit?`<button class="btn btn-ghost btn-sm" onclick="editEntry('${e.id}')">Edit</button>`:''}
      </td></tr>`).join('')}
    </tbody></table></div>`;
  });
  return html;
}
function feelDot(f){const c={Great:'#2e9e5b',Good:'#62b878',OK:'#d9a72b',Tired:'#d9822b',Rough:'#c0392b'}[f]||'#ccc';return `<span class="feel-dot" style="background:${c}"></span>`}

/* ============================================================
   ATHLETE: CALENDAR
============================================================ */
let CAL=new Date();
function renderCalendar(){
  const user=SESSION.role==='admin'?ADMIN_VIEW_USER:SESSION.username;
  return calendarFor(user);
}
function calendarFor(user){
  const y=CAL.getFullYear(),m=CAL.getMonth();
  const first=new Date(y,m,1), startDay=(first.getDay()+6)%7, days=new Date(y,m+1,0).getDate();
  const es=entriesOf(user), wks=workoutsOf(user);
  const byDate={};es.forEach(e=>{(byDate[e.date]=byDate[e.date]||[]).push(e)});
  const woByDate={};wks.forEach(w=>{(woByDate[w.date]=woByDate[w.date]||[]).push(w)});
  let cells='';
  for(let i=0;i<startDay;i++)cells+='<div></div>';
  for(let d=1;d<=days;d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const runs=byDate[ds]||[], wos=woByDate[ds]||[];
    const miles=runs.reduce((s,e)=>s+toMiles(+e.distance||0,e.unit),0);
    const isToday=ds===todayStr();
    cells+=`<div style="border:1px solid var(--line);border-radius:10px;min-height:84px;padding:6px;background:${isToday?'#fff7ef':'#fff'};${isToday?'border-color:var(--orange)':''}">
      <div style="font-size:12px;font-weight:700;color:${isToday?'var(--orange)':'#6b7280'}">${d}</div>
      ${runs.map(e=>`<div onclick="viewEntry('${e.id}')" style="cursor:pointer;margin-top:3px;font-size:10.5px" class="tag t-${e.type==='Cross-train'?'Cross':e.type}">${(+e.distance||0)}${e.unit} ${esc(e.type)}</div>`).join('')}
      ${miles>1&&runs.length>1?`<div style="font-size:10px;color:#6b7280;margin-top:2px">${miles.toFixed(1)} mi</div>`:''}
      ${wos.map(w=>`<div style="margin-top:3px;font-size:10px;color:#b35e00;background:#fff2e2;border-radius:5px;padding:1px 4px" title="${esc(w.description)}">★ assigned</div>`).join('')}
    </div>`;
  }
  const monthName=CAL.toLocaleDateString('en-US',{month:'long',year:'numeric'});
  return `
  <div class="page-title">Training Calendar${user&&SESSION.role==='admin'?' — '+esc((DB.get(KEY.users,[]).find(u=>u.username===user)||{}).name||user):''}</div>
  <div class="page-sub">Your runs and assigned workouts, month by month.</div>
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <button class="btn btn-ghost btn-sm" onclick="calMove(-1)">← Prev</button>
      <strong style="color:var(--navy);font-size:16px">${monthName}</strong>
      <button class="btn btn-ghost btn-sm" onclick="calMove(1)">Next →</button>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:6px">
      ${['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map(d=>`<div style="font-size:11px;font-weight:700;color:#6b7280;text-align:center">${d}</div>`).join('')}
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px">${cells}</div>
  </div>`;
}
function calMove(n){CAL.setMonth(CAL.getMonth()+n);go('calendar')}

    ${g.season?`<div style="margin-bottom:6px"><strong>Season:</strong> ${esc(g.season)}</div>`:''}
    ${g.races?`<div><strong>Races:</strong> ${esc(g.races)}</div>`:''}</div>`:''}

  <div style="display:flex;gap:10px;margin-bottom:12px">
    <button class="btn btn-navy btn-sm" onclick="adminCalendar('${u}')">📅 View Calendar</button>
    <button class="btn btn-primary btn-sm" onclick="ADMIN_VIEW_USER='${u}';go('assign')">➕ Assign Workout</button>
  </div>

  <h3 style="color:var(--navy);margin:6px 0 4px;font-size:15px">Run History</h3>
  ${historyTable(es,u,'','',false,true)}`;
}
function adminCalendar(u){ADMIN_VIEW_USER=u;go('calendar')}

/* ============================================================
   ADMIN: ASSIGN WORKOUT
============================================================ */
function renderAssign(){
  const ath=athletes();
  if(!ath.length)return `<div class="page-title">Assign Workout</div><div class="card"><div class="empty">No athletes to assign to yet.</div></div>`;
  const sel=ADMIN_VIEW_USER||ath[0].username;
  const recent=DB.get(KEY.workouts,[]).sort((a,b)=>b.date.localeCompare(a.date)).slice(0,12);
  return `
  <div class="page-title">Assign a Workout</div>
  <div class="page-sub">Prescribe a session — it shows up on the athlete's dashboard & calendar.</div>
  <div class="card" style="max-width:680px">
    <div class="row-form">
      <div class="field"><label>Athlete</label><select id="a_user">${ath.map(a=>`<option value="${a.username}" ${a.username===sel?'selected':''}>${esc(a.name)}</option>`).join('')}</select></div>
      <div class="field"><label>Date</label><input id="a_date" type="date" value="${todayStr()}"></div>
      <div class="field"><label>Type</label><select id="a_type">${['Easy','Workout','Long','Recovery','Race'].map(t=>`<option>${t}</option>`).join('')}</select></div>
      <div class="field full"><label>Workout Description</label><textarea id="a_desc" rows="3" placeholder="e.g. 6x800m @ 5K pace w/ 2:00 jog recovery + 2mi WU/CD"></textarea></div>
    </div>
    <div class="form-actions"><button class="btn btn-primary btn-sm" onclick="saveWorkout()">Assign Workout</button></div>
  </div>
  <h3 style="color:var(--navy);margin:22px 0 10px;font-size:15px">Recently Assigned</h3>
  <div class="card" style="padding:0;overflow:hidden">
    ${recent.length?`<table><thead><tr><th>Date</th><th>Athlete</th><th>Type</th><th>Workout</th><th></th></tr></thead><tbody>
    ${recent.map(w=>{const a=DB.get(KEY.users,[]).find(u=>u.username===w.athlete);return `<tr>
      <td>${fmtDate(w.date)}</td><td>${esc(a?a.name:w.athlete)}</td><td>${typeTag(w.type)}</td><td>${esc(w.description)}</td>
      <td><button class="btn btn-danger btn-sm" onclick="delWorkout('${w.id}')">Remove</button></td></tr>`}).join('')}
    </tbody></table>`:'<div class="empty">No workouts assigned yet.</div>'}
  </div>`;
}
function saveWorkout(){
  const desc=val('a_desc').trim();if(!desc){toast('Add a description');return;}
  const ws=DB.get(KEY.workouts,[]);
  ws.push({id:uid(),athlete:val('a_user'),date:val('a_date'),type:val('a_type'),description:desc,by:SESSION.name});
  DB.set(KEY.workouts,ws);
  toast('Workout assigned ✓');go('assign');
}
function delWorkout(id){DB.set(KEY.workouts,DB.get(KEY.workouts,[]).filter(w=>w.id!==id));toast('Removed');go('assign')}

/* ============================================================
   ADMIN: MANAGE USERS
============================================================ */
function renderUsers(){
  const users=DB.get(KEY.users,[]);
  const rows=users.map(u=>`<tr>
    <td><strong>${esc(u.name)}</strong></td><td>@${esc(u.username)}</td>
    <td><span class="pill ${u.role==='athlete'?'athlete':''}" style="font-size:10px">${u.role}</span></td>
    <td class="inline-actions">
      <button class="btn btn-ghost btn-sm" onclick="resetPass('${u.username}')">Reset Password</button>
      ${u.username!==SESSION.username?`<button class="btn btn-danger btn-sm" onclick="delUser('${u.username}')">Delete</button>`:'<span class="help">you</span>'}
    </td></tr>`).join('');
  return `
  <div class="page-title">Manage Users</div>
  <div class="page-sub">Add athletes, reset passwords, or remove accounts.</div>
  <div class="card" style="max-width:680px;margin-bottom:18px">
    <h3>Add New User</h3>
    <div class="row-form">
      <div class="field"><label>Full Name</label><input id="nu_name" placeholder="Jane Doe"></div>
      <div class="field"><label>Username</label><input id="nu_user" placeholder="username"></div>
      <div class="field"><label>Password</label><input id="nu_pass" placeholder="temp password"></div>
      <div class="field"><label>Role</label><select id="nu_role"><option value="athlete">Athlete</option><option value="admin">Admin / Coach</option></select></div>
    </div>
    <div class="form-actions"><button class="btn btn-primary btn-sm" onclick="addUser()">Add User</button></div>
  </div>
  <div class="card" style="padding:0;overflow:hidden">
    <table><thead><tr><th>Name</th><th>Username</th><th>Role</th><th></th></tr></thead><tbody>${rows}</tbody></table>
  </div>`;
}
async function addUser(){
  const name=val('nu_name').trim(),u=val('nu_user').trim(),p=val('nu_pass');
  if(!name||!u||!p){toast('Fill in all fields');return;}
  const users=DB.get(KEY.users,[]);
  if(users.some(x=>x.username.toLowerCase()===u.toLowerCase())){toast('Username taken');return;}
  users.push({username:u,pass:await sha(p),name,role:val('nu_role')});
  DB.set(KEY.users,users);toast('User added ✓');go('users');
}
async function resetPass(u){
  const p=prompt('New password for @'+u+':');if(!p)return;
  const users=DB.get(KEY.users,[]);const i=users.findIndex(x=>x.username===u);
  users[i].pass=await sha(p);delete users[i].password;DB.set(KEY.users,users);toast('Password reset ✓');
}
function delUser(u){
  if(!confirm('Delete @'+u+' and all their logged runs?'))return;
  DB.set(KEY.users,DB.get(KEY.users,[]).filter(x=>x.username!==u));
  DB.set(KEY.entries,allEntries().filter(e=>e.user!==u));
  DB.set(KEY.workouts,DB.get(KEY.workouts,[]).filter(w=>w.athlete!==u));
  toast('User deleted');go('users');
}

/* ============================================================
   MODAL
============================================================ */
function openModal(html){el('modalRoot').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">${html}</div></div>`}
function closeModal(){el('modalRoot').innerHTML=''}

/* ============================================================
   BOOT
============================================================ */
(async function(){
  // 1. load local cache
  try{ const c=JSON.parse(localStorage.getItem(LS)); if(c) STATE=shaped(c); }catch(e){}
  // 2. pull cloud (authoritative when configured)
  if(cloudOn()){ const d=await pullCloud(); if(d) adoptState(d); }
  // 3. upgrade any plaintext passwords, then seed admin if empty
  await migratePasswords();
  await ensureSeed();
  // 4. keep in sync
  startSync();
  // 5. restore session
  try{ const s=JSON.parse(localStorage.getItem(LS_SESSION)); if(s&&STATE.users.some(u=>u.username===s.username)){SESSION=s;enterApp();} }catch(e){}
  // enter key on login
  document.addEventListener('keydown',e=>{
    if(e.key==='Enter'&&!el('loginScreen').classList.contains('hidden')){
      if(!el('signinForm').classList.contains('hidden'))doLogin();
      else doRegister();
    }
  });
})();
</script>
