<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Road to 13.1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#232D4B;
    --navy-700:#2c3a61;
    --orange:#E57200;
    --orange-700:#c66200;
    --ink:#161b2e;
    --muted:#646c7e;
    --faint:#9aa1b1;
    --bg:#f5f6f8;
    --card:#ffffff;
    --line:#e7e9ee;
    --line-strong:#d7dae2;
    --run:#E57200;
    --bike:#15936b;
    --swim:#2f74e0;
    --good:#1f9d55;
    --bad:#d23b3b;
    --radius:14px;
    --shadow:0 1px 2px rgba(16,24,40,.04),0 1px 3px rgba(16,24,40,.05);
    --shadow-lg:0 10px 30px rgba(16,24,40,.12);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased;font-feature-settings:'cv02','cv03','cv04','ss01'}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:14px;color:var(--ink)}
  .num{font-variant-numeric:tabular-nums}
  .hidden{display:none !important}
  ::selection{background:#ffe1c2}

  /* ---------------- LOGIN ---------------- */
  #loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:24px}
  .login-card{background:var(--card);width:100%;max-width:400px;border-radius:18px;padding:36px 32px;border:1px solid var(--line);box-shadow:var(--shadow-lg)}
  .brand{display:flex;flex-direction:column;align-items:center;margin-bottom:24px}
  .logo-badge{width:60px;height:60px;border-radius:16px;background:var(--navy);display:flex;align-items:center;justify-content:center;font-size:30px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.06)}
  .brand h1{font-size:21px;font-weight:800;margin-top:14px;color:var(--navy);letter-spacing:-.02em}
  .brand p{font-size:13px;color:var(--muted);margin-top:4px}
  .field{margin-bottom:15px}
  .field label{display:block;font-size:12.5px;font-weight:600;color:#3f4759;margin-bottom:6px}
  .field input,.field select,.field textarea{width:100%;padding:11px 12px;border:1px solid var(--line-strong);border-radius:10px;outline:none;background:#fff;transition:border-color .15s,box-shadow .15s}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(229,114,0,.12)}
  .field textarea{resize:vertical}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border:1px solid transparent;border-radius:10px;padding:10px 16px;font-weight:600;font-size:14px;transition:background .15s,border-color .15s,transform .05s}
  .btn:active{transform:translateY(1px)}
  .btn-primary{background:var(--orange);color:#fff}
  .btn-primary:hover{background:var(--orange-700)}
  .btn-navy{background:var(--navy);color:#fff}
  .btn-navy:hover{background:var(--navy-700)}
  .btn-ghost{background:#fff;color:var(--ink);border-color:var(--line-strong)}
  .btn-ghost:hover{background:#f4f5f7}
  .btn-sm{padding:7px 12px;font-size:13px;border-radius:9px}
  .btn-block{width:100%}
  .btn-danger{background:#fff;color:var(--bad);border-color:#f0cccc}
  .btn-danger:hover{background:#fdf3f3}
  .link{color:var(--orange);font-weight:600;cursor:pointer;font-size:13px;background:none;border:none;padding:0}
  .link:hover{text-decoration:underline}
  .login-toggle{text-align:center;margin-top:18px;font-size:13px;color:var(--muted)}
  .msg{font-size:13px;padding:10px 12px;border-radius:9px;margin-bottom:14px}
  .msg.err{background:#fdeceb;color:#a83232;border:1px solid #f3cfcc}
  .msg.ok{background:#eaf7ef;color:#1c6b3c;border:1px solid #c2e6cf}

  /* ---------------- APP SHELL ---------------- */
  header.topbar{background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:11px 22px;position:sticky;top:0;z-index:30}
  .topbar .left{display:flex;align-items:center;gap:12px}
  .logo-sm{width:38px;height:38px;border-radius:11px;background:var(--navy);display:flex;align-items:center;justify-content:center;font-size:21px}
  .topbar h2{font-size:16px;font-weight:800;color:var(--navy);letter-spacing:-.02em;line-height:1.1}
  .topbar .who{font-size:12px;color:var(--muted)}
  .topbar .right{display:flex;align-items:center;gap:12px}
  .userchip{display:flex;align-items:center;gap:9px}
  .avatar{width:32px;height:32px;border-radius:50%;background:#eef0f4;color:var(--navy);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
  .pill{font-size:11px;font-weight:700;padding:3px 9px;border-radius:7px;letter-spacing:.02em;text-transform:uppercase}
  .pill.coach{background:#fdeede;color:#b4570a}
  .pill.athlete{background:#e9eefb;color:#39529e}

  nav.tabs{background:#fff;border-bottom:1px solid var(--line);display:flex;gap:4px;padding:0 18px;overflow-x:auto;position:sticky;top:61px;z-index:20}
  nav.tabs::-webkit-scrollbar{height:0}
  nav.tabs button{background:none;border:none;padding:13px 14px 12px;font-size:14px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;transition:color .15s}
  nav.tabs button.active{color:var(--navy);border-bottom-color:var(--orange)}
  nav.tabs button:hover{color:var(--navy)}

  main{max-width:1080px;margin:0 auto;padding:26px 20px 70px}
  .page-title{font-size:24px;font-weight:800;color:var(--navy);letter-spacing:-.02em;margin-bottom:3px}
  .page-sub{color:var(--muted);font-size:14px;margin-bottom:22px}

  .grid{display:grid;gap:16px}
  .cards-4{grid-template-columns:repeat(4,1fr)}
  .cards-3{grid-template-columns:repeat(3,1fr)}
  .cards-2{grid-template-columns:repeat(2,1fr)}
  @media(max-width:860px){.cards-4{grid-template-columns:repeat(2,1fr)}.cards-3,.cards-2{grid-template-columns:1fr}}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}
  .card.pad0{padding:0;overflow:hidden}
  .card h3{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
  .stat .label{font-size:11.5px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.04em}
  .stat .value{font-size:30px;font-weight:800;color:var(--navy);margin-top:6px;letter-spacing:-.02em;line-height:1}
  .stat .unit{font-size:14px;color:var(--muted);font-weight:600}
  .stat .trend{font-size:12.5px;margin-top:7px;font-weight:600;color:var(--muted)}
  .stat .accent{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
  .up{color:var(--good)} .down{color:var(--bad)}

  table{width:100%;border-collapse:collapse;font-size:13.5px}
  th{text-align:left;color:var(--muted);font-weight:600;font-size:11.5px;text-transform:uppercase;letter-spacing:.04em;padding:11px 14px;border-bottom:1px solid var(--line);background:#fbfbfc}
  td{padding:12px 14px;border-bottom:1px solid var(--line);vertical-align:middle}
  tbody tr:last-child td{border-bottom:none}
  tbody tr{transition:background .12s}
  tbody tr:hover td{background:#fafbfd}

  .stag{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;padding:3px 9px 3px 7px;border-radius:8px}
  .stag.Run{color:#b4570a;background:#fdf0e4}
  .stag.Bike{color:#0e6e4f;background:#e7f5ef}
  .stag.Swim{color:#23579f;background:#e9f1fd}
  .ttag{font-size:12px;font-weight:600;color:var(--muted)}

  .seg{display:inline-flex;background:#f1f2f5;border-radius:11px;padding:4px;gap:4px}
  .seg-btn{display:inline-flex;align-items:center;gap:7px;border:none;background:transparent;color:var(--muted);font-weight:600;font-size:13.5px;padding:8px 16px;border-radius:8px;transition:all .15s}
  .seg-btn:hover{color:var(--ink)}
  .seg-btn.active{background:#fff;color:var(--navy);box-shadow:var(--shadow)}
  .seg-btn.active.Run{color:var(--run)} .seg-btn.active.Bike{color:var(--bike)} .seg-btn.active.Swim{color:var(--swim)}

  /* stacked weekly chart */
  .chart{display:flex;align-items:flex-end;gap:10px;height:190px;padding-top:8px}
  .bar-col{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;gap:8px;justify-content:flex-end}
  .bar-wrap{width:100%;flex:1;display:flex;align-items:flex-end;justify-content:center}
  .bar-stack{width:62%;max-width:34px;border-radius:6px 6px 0 0;overflow:hidden;display:flex;flex-direction:column-reverse;background:#eef0f3;min-height:3px}
  .seg-run{background:var(--run)} .seg-bike{background:var(--bike)} .seg-swim{background:var(--swim)}
  .bar-lbl{font-size:11px;color:var(--faint);font-weight:600}
  .legend{display:flex;gap:16px;margin-top:14px;flex-wrap:wrap}
  .legend span{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);font-weight:600}
  .dot{width:9px;height:9px;border-radius:3px;display:inline-block}

  .row-form{display:grid;grid-template-columns:repeat(3,1fr);gap:15px}
  @media(max-width:680px){.row-form{grid-template-columns:1fr 1fr}}
  .full{grid-column:1/-1}
  .form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:8px;flex-wrap:wrap}
  .help{font-size:12px;color:var(--faint);margin-top:5px}

  .empty{text-align:center;color:var(--faint);padding:34px 20px;font-size:14px}
  .comment{background:#fafbfd;border:1px solid var(--line);border-left:3px solid var(--orange);padding:11px 13px;border-radius:0 9px 9px 0;margin-top:9px;font-size:13.5px}
  .comment .meta{font-size:11.5px;color:var(--muted);font-weight:600;margin-bottom:3px}
  .feel-dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:middle}
  .progress{height:8px;background:#eef0f3;border-radius:6px;overflow:hidden;margin-top:10px}
  .progress > span{display:block;height:100%;background:var(--orange);border-radius:6px}

  /* calendar */
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:7px}
  .cal-head{font-size:11px;font-weight:700;color:var(--faint);text-align:center;text-transform:uppercase;letter-spacing:.04em;padding-bottom:2px}
  .cal-day{border:1px solid var(--line);border-radius:11px;min-height:88px;padding:7px;background:#fff;transition:border-color .12s,box-shadow .12s}
  .cal-day.clk{cursor:pointer}
  .cal-day.clk:hover{border-color:var(--line-strong);box-shadow:var(--shadow)}
  .cal-day.today{border-color:var(--orange);background:#fffaf4}
  .cal-dnum{font-size:12px;font-weight:700;color:var(--muted)}
  .cal-day.today .cal-dnum{color:var(--orange)}
  .cal-chip{margin-top:4px;font-size:10.5px;font-weight:700;border-radius:6px;padding:2px 6px;display:flex;align-items:center;gap:4px}
  .cal-assign{margin-top:4px;font-size:10px;font-weight:700;border-radius:6px;padding:2px 6px;display:flex;align-items:center;gap:4px}

  .athlete-select{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
  .ath-chip{background:#fff;border:1px solid var(--line-strong);border-radius:9px;padding:8px 14px;font-size:13px;font-weight:600;color:#3f4759;transition:all .12s}
  .ath-chip:hover{border-color:var(--navy)}
  .ath-chip.active{background:var(--navy);color:#fff;border-color:var(--navy)}
  .inline-actions{display:flex;gap:7px;flex-wrap:wrap}
  .week-head{display:flex;justify-content:space-between;align-items:baseline;margin:22px 0 9px;color:var(--navy);font-weight:700;font-size:14px}
  .week-head .vol{color:var(--muted);font-weight:600;font-size:13px}

  /* modal */
  .modal-bg{position:fixed;inset:0;background:rgba(20,26,45,.5);backdrop-filter:blur(2px);display:flex;align-items:flex-start;justify-content:center;z-index:50;padding:32px 18px;overflow:auto}
  .modal{background:#fff;border-radius:16px;max-width:560px;width:100%;padding:24px;box-shadow:var(--shadow-lg);border:1px solid var(--line)}
  .modal h3{color:var(--navy);font-size:18px;font-weight:800;margin-bottom:6px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .x{background:none;border:none;font-size:22px;color:var(--faint);cursor:pointer;line-height:1;padding:0 2px}
  .x:hover{color:var(--ink)}
  .kv{width:100%;font-size:13.5px}
  .kv td{padding:7px 0;border-bottom:1px solid var(--line)}
  .kv td:first-child{color:var(--muted);font-weight:600;width:140px}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--navy);color:#fff;padding:11px 18px;border-radius:10px;font-size:13.5px;font-weight:600;box-shadow:var(--shadow-lg);z-index:80;opacity:0;transition:opacity .2s,transform .2s;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- ================= LOGIN ================= -->
<div id="loginScreen">
  <div class="login-card">
    <div class="brand">
      <div class="logo-badge">🐡</div>
      <h1>Road to 13.1</h1>
      <p>Run. Ride. Swim. Track every mile.</p>
    </div>
    <div id="loginMsg"></div>
    <div id="signinForm">
      <div class="field"><label>Username</label><input id="li_user" autocomplete="username" placeholder="username"></div>
      <div class="field"><label>Password</label><input id="li_pass" type="password" autocomplete="current-password" placeholder="••••••••"></div>
      <button class="btn btn-primary btn-block" onclick="doLogin()">Sign In</button>
      <div class="login-toggle">New here? <button class="link" onclick="showRegister(true)">Create an account</button></div>
    </div>
    <div id="registerForm" class="hidden">
      <div class="field"><label>Full name</label><input id="rg_name" placeholder="Jane Doe"></div>
      <div class="field"><label>Username</label><input id="rg_user" placeholder="letters, numbers, _"></div>
      <div class="field"><label>Password</label><input id="rg_pass" type="password" placeholder="choose a password"></div>
      <button class="btn btn-primary btn-block" onclick="doRegister()">Create Account</button>
      <div class="login-toggle">Have an account? <button class="link" onclick="showRegister(false)">Sign in</button></div>
    </div>
  </div>
</div>

<!-- ================= APP ================= -->
<div id="app" class="hidden">
  <header class="topbar">
    <div class="left">
      <div class="logo-sm">🐡</div>
      <div>
        <h2>Road to 13.1</h2>
        <div class="who" id="whoBar"></div>
      </div>
    </div>
    <div class="right">
      <div class="userchip">
        <span class="pill athlete" id="rolePill">Athlete</span>
        <div class="avatar" id="avatar">A</div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="logout()">Sign Out</button>
    </div>
  </header>
  <nav class="tabs" id="tabBar"></nav>
  <main id="view"></main>
</div>

<div id="modalRoot"></div>
<div id="toast" class="toast"></div>

<script>
/* ============================================================
   CONFIG — shared cloud sync (Firebase Realtime DB)
============================================================ */
const CLOUD_URL = "https://running-training-log-6f0e9-default-rtdb.firebaseio.com";

/* ============================================================
   DATA LAYER — in-memory STATE, mirrored to localStorage + cloud
   (granular per-item writes so two devices never clobber)
============================================================ */
const KEY={users:'users',entries:'entries',goals:'goals',workouts:'workouts',comments:'comments'};
const LS='roadto131_state', LS_SESSION='roadto131_session';
let STATE={users:[],entries:[],goals:{},workouts:[],comments:[]};
let SESSION=null;

const DB={
  get(k,def){ const v=STATE[k]; return (v===undefined||v===null)?def:v; },
  set(k,v){ STATE[k]=v; persistLocal(); pushColl(k); }
};
function shaped(d){return {users:(d&&d.users)||[],entries:(d&&d.entries)||[],goals:(d&&d.goals)||{},workouts:(d&&d.workouts)||[],comments:(d&&d.comments)||[]};}
function persistLocal(){ try{localStorage.setItem(LS,JSON.stringify(STATE))}catch(e){} }

function cloudOn(){ return /^https?:\/\//.test(CLOUD_URL); }
function cloudRoot(sub){ return CLOUD_URL.replace(/\/+$/,'')+'/roadto131'+(sub||'')+'.json'; }
const COLLKEY={users:u=>u.username, entries:e=>e.id, workouts:w=>w.id, comments:c=>c.id};
let MIRROR={users:{},entries:{},workouts:{},comments:{},goals:{}};
function safeKey(k){ return String(k).replace(/[.#$\[\]\/]/g,'_'); }
function toMap(coll,val){ if(coll==='goals') return val||{}; const m={}; (val||[]).forEach(it=>{const k=COLLKEY[coll](it); if(k!=null)m[safeKey(k)]=it;}); return m; }
function fromMap(coll,m){ if(coll==='goals') return m||{}; return m?Object.keys(m).map(k=>m[k]):[]; }
function normMap(x){ if(!x) return {}; if(Array.isArray(x)){const m={};x.forEach((v,i)=>{if(v!=null)m[i]=v});return m;} return x; }
function rawToMaps(raw){ raw=raw||{}; return {users:normMap(raw.users),entries:normMap(raw.entries),workouts:normMap(raw.workouts),comments:normMap(raw.comments),goals:normMap(raw.goals)}; }
function adoptCloud(raw){ const m=rawToMaps(raw); MIRROR=m; STATE={users:fromMap('users',m.users),entries:fromMap('entries',m.entries),workouts:fromMap('workouts',m.workouts),comments:fromMap('comments',m.comments),goals:m.goals||{}}; persistLocal(); }
function pushColl(coll){
  if(!cloudOn()) return;
  const desired=toMap(coll,STATE[coll]), prev=MIRROR[coll]||{}, updates={};
  for(const k in desired){ if(JSON.stringify(desired[k])!==JSON.stringify(prev[k])) updates[k]=desired[k]; }
  for(const k in prev){ if(!(k in desired)) updates[k]=null; }
  MIRROR[coll]=desired;
  if(!Object.keys(updates).length) return;
  fetch(cloudRoot('/'+coll),{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(updates)}).catch(e=>console.warn('push failed',coll,e));
}
async function pullCloud(){ if(!cloudOn()) return null; try{ const r=await fetch(cloudRoot(),{cache:'no-store'}); if(!r.ok) return null; return await r.json(); }catch(e){ console.warn('pull failed',e); return null; } }
const SAFE_REFRESH=new Set(['dashboard','calendar','history','roster','athlete','users']);
function startSync(){
  if(!cloudOn()) return;
  setInterval(async()=>{
    const raw=await pullCloud(); if(raw===null) return;
    const m=rawToMaps(raw);
    const cand={users:fromMap('users',m.users),entries:fromMap('entries',m.entries),workouts:fromMap('workouts',m.workouts),comments:fromMap('comments',m.comments),goals:m.goals||{}};
    MIRROR=m;
    if(JSON.stringify(cand)!==JSON.stringify(STATE)){ STATE=cand; persistLocal(); if(SESSION && !el('modalRoot').innerHTML && !FORM_OPEN && SAFE_REFRESH.has(CURRENT)) go(CURRENT); }
  },10000);
}

async function sha(text){
  try{ const buf=await crypto.subtle.digest('SHA-256', new TextEncoder().encode('rt131:'+text)); return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,'0')).join(''); }
  catch(e){ let h=2166136261; const s='rt131:'+text; for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619)} return 'fb'+(h>>>0).toString(16); }
}
async function migratePasswords(){ let changed=false; for(const u of STATE.users){ if(u.password && !u.pass){ u.pass=await sha(u.password); delete u.password; changed=true; } } if(changed){ persistLocal(); pushColl('users'); } }
async function ensureSeed(){ if(!STATE.users || STATE.users.length===0){ STATE.users=[{username:'eric',pass:await sha('gohoos'),name:'Eric (Coach)',role:'admin'}]; persistLocal(); pushColl('users'); } }

/* ============================================================
   AUTH
============================================================ */
function showRegister(show){ el('signinForm').classList.toggle('hidden',show); el('registerForm').classList.toggle('hidden',!show); loginMsg(''); }
function loginMsg(t,type){ el('loginMsg').innerHTML=t?`<div class="msg ${type||'err'}">${t}</div>`:''; }
async function doLogin(){
  const u=val('li_user').trim(), p=val('li_pass');
  if(!u||!p){loginMsg('Enter username and password.');return;}
  if(cloudOn()){ const d=await pullCloud(); if(d!==null) adoptCloud(d); }
  const user=DB.get(KEY.users,[]).find(x=>x.username.toLowerCase()===u.toLowerCase());
  const ph=await sha(p);
  if(!user||user.pass!==ph){loginMsg('Incorrect username or password.');return;}
  SESSION={username:user.username,role:user.role,name:user.name};
  try{localStorage.setItem(LS_SESSION,JSON.stringify(SESSION))}catch(e){}
  enterApp();
}
async function doRegister(){
  const name=val('rg_name').trim(), p=val('rg_pass');
  const u=val('rg_user').trim().replace(/[^a-zA-Z0-9_]/g,'');
  if(!name||!u||!p){loginMsg('Fill in all fields (username: letters, numbers, underscore).');return;}
  if(cloudOn()){ const d=await pullCloud(); if(d!==null) adoptCloud(d); }
  const users=DB.get(KEY.users,[]);
  if(users.some(x=>x.username.toLowerCase()===u.toLowerCase())){loginMsg('That username is taken.');return;}
  users.push({username:u,pass:await sha(p),name:name,role:'athlete'});
  DB.set(KEY.users,users);
  loginMsg('Account created! You can sign in now.','ok');
  showRegister(false); el('li_user').value=u;
}

/* ============================================================
   HELPERS
============================================================ */
function val(id){return document.getElementById(id).value}
function el(id){return document.getElementById(id)}
function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function toast(t){const e=el('toast');e.textContent=t;e.classList.add('show');clearTimeout(window._tt);window._tt=setTimeout(()=>e.classList.remove('show'),2200)}
function fmtDate(d){return new Date(d+'T00:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}
function todayStr(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function weekStart(dateStr){const d=new Date(dateStr+'T00:00:00');const day=(d.getDay()+6)%7;d.setDate(d.getDate()-day);return d.toISOString().slice(0,10)}
function weekLabel(ws){return new Date(ws+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'})}
function parseDur(h,m,s){return (+h||0)*3600+(+m||0)*60+(+s||0)}
function secsToHMS(secs){if(!secs)return '—';const h=Math.floor(secs/3600),m=Math.floor((secs%3600)/60),s=Math.round(secs%60);return (h?h+':':'')+(h?String(m).padStart(2,'0'):m)+':'+String(s).padStart(2,'0')}

/* ---- sports ---- */
const SPORTS={
  Run:{color:'#E57200', units:['mi','km'], types:['Easy','Workout','Long','Race','Recovery'], metric:'pace'},
  Bike:{color:'#15936b', units:['mi','km'], types:['Endurance','Intervals','Long','Race','Recovery'], metric:'speed'},
  Swim:{color:'#2f74e0', units:['yd','m'], types:['Technique','Endurance','Intervals','Race','Recovery'], metric:'swim'}
};
const SPORT_LIST=['Run','Bike','Swim'];
function sportOf(e){return SPORTS[e.sport]?e.sport:'Run'}
function sportIcon(sport,size){
  size=size||16; const c=(SPORTS[sport]||SPORTS.Run).color;
  const p={
    Run:'<path d="M13.5 4.2a1.6 1.6 0 1 0 0-3.2 1.6 1.6 0 0 0 0 3.2Z"/><path d="M9 21l2-4.5 2.2 1.7.8 2.8"/><path d="M3.5 11.2 7 9.6l2.6 2.2 2.1-4.3 2 2.4 3.2.4"/>',
    Bike:'<circle cx="5.6" cy="17" r="3.4"/><circle cx="18.4" cy="17" r="3.4"/><path d="M5.6 17 9.5 9.5h4.3L11 17"/><path d="M11.5 9.5H15M14 6h2.4l1.6 3.5"/>',
    Swim:'<circle cx="17" cy="6.6" r="1.7"/><path d="M5.5 11.5 10 9l3.2 2.4 2-1.2"/><path d="M2.5 16.2c1.3 0 1.9 1 3.2 1s1.9-1 3.2-1 1.9 1 3.2 1 1.9-1 3.2-1 1.9 1 3.2 1"/><path d="M2.5 19.6c1.3 0 1.9 1 3.2 1s1.9-1 3.2-1 1.9 1 3.2 1 1.9-1 3.2-1 1.9 1 3.2 1"/>'
  }[sport]||'';
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:middle">${p}</svg>`;
}
function sportTag(sport){return `<span class="stag ${sport}">${sportIcon(sport,13)} ${sport}</span>`}
function distUnit(e){return e.unit||(sportOf(e)==='Swim'?'yd':'mi')}
function metricStr(e){
  const sp=sportOf(e), d=+e.distance||0, secs=+e.dur||0, u=distUnit(e);
  if(!d||!secs) return '—';
  if(sp==='Bike'){ const hrs=secs/3600; return (d/hrs).toFixed(1)+' '+u+'/h'; }
  if(sp==='Swim'){ const per=secs/(d/100); const m=Math.floor(per/60),s=Math.round(per%60); return `${m}:${String(s).padStart(2,'0')}/100${u}`; }
  const per=secs/d; const m=Math.floor(per/60),s=Math.round(per%60); return `${m}:${String(s).padStart(2,'0')}/${u}`;
}
function metricLabel(sport){return sport==='Bike'?'Speed':sport==='Swim'?'Pace /100':'Pace'}
// base distance for weekly volume: run/bike -> miles, swim -> yards
function toBase(e){const sp=sportOf(e),d=+e.distance||0,u=distUnit(e); if(sp==='Swim')return u==='m'?d*1.09361:d; return u==='km'?d*0.621371:d;}
function baseUnit(sport){return sport==='Swim'?'yd':'mi'}

/* data accessors */
function entriesOf(user){return DB.get(KEY.entries,[]).filter(e=>e.user===user).sort((a,b)=>b.date.localeCompare(a.date))}
function allEntries(){return DB.get(KEY.entries,[])}
function goalsOf(user){return DB.get(KEY.goals,{})[user]||{weekly:0,season:'',races:''}}
function setGoals(user,g){const all=DB.get(KEY.goals,{});all[user]=g;DB.set(KEY.goals,all)}
function commentsOf(entryId){return DB.get(KEY.comments,[]).filter(c=>c.entryId===entryId)}
function workoutsOf(user){return DB.get(KEY.workouts,[]).filter(w=>w.athlete===user).sort((a,b)=>a.date.localeCompare(b.date))}
function athletes(){return DB.get(KEY.users,[]).filter(u=>u.role==='athlete')}
function workoutDone(w){return allEntries().some(e=>e.workoutId===w.id)}

/* weekly aggregation */
function weeksList(n){const out=[];const base=new Date(weekStart(todayStr())+'T00:00:00');for(let i=n-1;i>=0;i--){const d=new Date(base);d.setDate(base.getDate()-i*7);out.push(d.toISOString().slice(0,10));}return out;}
function weeklyTimeBySport(user,n){
  const es=entriesOf(user),map={};
  es.forEach(e=>{const w=weekStart(e.date);(map[w]=map[w]||{Run:0,Bike:0,Swim:0});map[w][sportOf(e)]+=(+e.dur||0);});
  return weeksList(n).map(w=>({week:w,Run:(map[w]||{}).Run||0,Bike:(map[w]||{}).Bike||0,Swim:(map[w]||{}).Swim||0}));
}
function weekDist(user,sport){
  const ws=weekStart(todayStr());
  return entriesOf(user).filter(e=>sportOf(e)===sport && weekStart(e.date)===ws).reduce((s,e)=>s+toBase(e),0);
}
function weekTime(user){const wk=weeklyTimeBySport(user,1)[0];return wk.Run+wk.Bike+wk.Swim;}

function tint(sport){return {Run:'#fdf0e4',Bike:'#e7f5ef',Swim:'#e9f1fd'}[sport]||'#eef0f4'}
function hoursStr(secs){if(!secs)return '0<span class="unit">m</span>';const h=Math.floor(secs/3600),m=Math.round((secs%3600)/60);return h?`${h}<span class="unit">h</span> ${m}<span class="unit">m</span>`:`${m}<span class="unit">m</span>`;}
function chartHTML(data){
  const totals=data.map(d=>d.Run+d.Bike+d.Swim);
  const max=Math.max(1,...totals);
  const seg=(d,sport,cls)=>{const t=d.Run+d.Bike+d.Swim; if(!t||!d[sport])return ''; return `<div class="${cls}" style="height:${d[sport]/t*100}%"></div>`;};
  const bars=data.map(d=>{const t=d.Run+d.Bike+d.Swim;const h=t/max*100;
    return `<div class="bar-col"><div class="bar-wrap"><div class="bar-stack" style="height:${h}%" title="${weekLabel(d.week)}: ${hoursStrPlain(t)}">${seg(d,'Run','seg-run')}${seg(d,'Bike','seg-bike')}${seg(d,'Swim','seg-swim')}</div></div><div class="bar-lbl">${weekLabel(d.week)}</div></div>`;}).join('');
  return `<div class="chart">${bars}</div>
    <div class="legend"><span><i class="dot" style="background:var(--run)"></i>Run</span><span><i class="dot" style="background:var(--bike)"></i>Bike</span><span><i class="dot" style="background:var(--swim)"></i>Swim</span></div>`;
}
function hoursStrPlain(secs){const h=Math.floor(secs/3600),m=Math.round((secs%3600)/60);return h?`${h}h ${m}m`:`${m}m`;}

function saveEntry(editId,workoutId){
  const existing=editId?allEntries().find(x=>x.id===editId):null;
  const sport=val('f_sport');
  const entry={
    id:editId||uid(), user:SESSION.username, sport,
    date:val('f_date'), type:val('f_type'),
    distance:+val('f_dist'), unit:val('f_unit'),
    dur:parseDur(val('f_h'),val('f_m'),val('f_s')),
    surface:val('f_surface'), shoes:val('f_shoes'), elev:val('f_elev'), stroke:val('f_stroke'), water:val('f_water'),

    feel:val('f_feel'), injury:val('f_injury'), notes:val('f_notes'),
    workoutId: workoutId || (existing&&existing.workoutId) || ''
  };

  const all=allEntries(); const i=all.findIndex(x=>x.id===entry.id);
  if(i>=0)all[i]=entry; else all.push(entry);
  DB.set(KEY.entries,all);
  toast(editId?'Updated ✓':(entry.workoutId?'Workout complete ✓':'Activity logged ✓'));
  go(SESSION.role==='admin'?'athlete':'calendar');
}
function deleteEntry(id){
  if(!confirm('Delete this activity?'))return;
  DB.set(KEY.entries,allEntries().filter(e=>e.id!==id));
  DB.set(KEY.comments,DB.get(KEY.comments,[]).filter(c=>c.entryId!==id));
  toast('Deleted'); closeModal(); go(SESSION.role==='admin'?'athlete':'calendar');
}

/* ============================================================
   HISTORY
============================================================ */
function renderHistory(){ return historyTable(entriesOf(SESSION.username),SESSION.username,'Activity history','Everything you\'ve logged.',true,false); }
function historyTable(es,user,title,sub,canEdit,bare){
  if(!es.length) return (bare?'':`<div class="page-title">${title}</div><div class="page-sub">${sub}</div>`)+`<div class="card"><div class="empty">No activities logged yet.</div></div>`;
  const groups={};es.forEach(e=>{const w=weekStart(e.date);(groups[w]=groups[w]||[]).push(e)});
  const weeks=Object.keys(groups).sort((a,b)=>b.localeCompare(a));
  let html=bare?'':`<div class="page-title">${title}</div><div class="page-sub">${sub}</div>`;
  weeks.forEach(w=>{
    const list=groups[w];
    const runmi=list.filter(e=>sportOf(e)==='Run').reduce((s,e)=>s+toBase(e),0);
    const secs=list.reduce((s,e)=>s+(+e.dur||0),0);
    html+=`<div class="week-head"><span>Week of ${weekLabel(w)}</span><span class="vol">${runmi.toFixed(1)} run mi · ${hoursStrPlain(secs)} · ${list.length} sessions</span></div>
    <div class="card pad0"><table><thead><tr><th>Date</th><th>Sport</th><th>Type</th><th>Dist</th><th>Time</th><th>Pace/Speed</th><th>RPE</th><th>Feel</th><th></th></tr></thead><tbody>
    ${list.map(e=>`<tr>
      <td style="color:var(--muted);white-space:nowrap">${fmtDate(e.date)}</td><td>${sportTag(sportOf(e))}</td><td class="ttag">${esc(e.type)}</td>
      <td class="num">${(+e.distance||0)} ${distUnit(e)}</td><td class="num">${secsToHMS(e.dur)}</td>
      <td class="num" style="color:var(--muted)">${metricStr(e)}</td><td class="num">${e.rpe||'—'}</td><td>${feelDot(e.feel)}${esc(e.feel||'')}</td>
      <td class="inline-actions"><button class="btn btn-ghost btn-sm" onclick="viewEntry('${e.id}')">View</button>${canEdit?`<button class="btn btn-ghost btn-sm" onclick="editEntry('${e.id}')">Edit</button>`:''}</td>
    </tr>`).join('')}
    </tbody></table></div>`;
  });
  return html;
}

function renderCalendar(){ return calendarFor(SESSION.role==='admin'?ADMIN_VIEW_USER:SESSION.username); }
function calendarFor(user){
  const isAth=SESSION.role!=='admin';
  const y=CAL.getFullYear(),m=CAL.getMonth();
  const startDay=(new Date(y,m,1).getDay()+6)%7, days=new Date(y,m+1,0).getDate();
  const es=entriesOf(user), wks=workoutsOf(user);
  const byDate={};es.forEach(e=>{(byDate[e.date]=byDate[e.date]||[]).push(e)});
  const woByDate={};wks.forEach(w=>{(woByDate[w.date]=woByDate[w.date]||[]).push(w)});
  let cells='';
  for(let i=0;i<startDay;i++)cells+='<div></div>';
  for(let d=1;d<=days;d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const runs=byDate[ds]||[], wos=woByDate[ds]||[];
    const freeRuns=runs.filter(e=>!e.workoutId);
    const isToday=ds===todayStr();
    const woChips=wos.map(w=>{const done=workoutDone(w);const c=SPORTS[sportOf(w)].color;
      return `<div class="cal-assign" style="color:${done?'#0e7a45':c};background:${done?'#e7f5ee':tint(sportOf(w))}" title="${esc(w.description)}">${done?'✓':sportIcon(sportOf(w),11)} ${esc(w.type)}</div>`;}).join('');
    const runChips=(isAth?freeRuns:runs).map(e=>`<div class="cal-chip ${sportOf(e)}" ${isAth?'':`onclick="viewEntry('${e.id}')" style="cursor:pointer"`}><span class="stag ${sportOf(e)}" style="padding:0;background:none">${sportIcon(sportOf(e),11)}</span>${(+e.distance||0)}${distUnit(e)}</div>`).join('');
    cells+=`<div class="cal-day ${isAth?'clk':''} ${isToday?'today':''}" ${isAth?`onclick="openDay('${ds}')"`:''}>
      <div class="cal-dnum">${d}</div>${woChips}${runChips}</div>`;
  }
  return `
  <div class="page-title">Calendar${!isAth&&user?' — '+esc((DB.get(KEY.users,[]).find(u=>u.username===user)||{}).name||user):''}</div>
  <div class="page-sub">${isAth?'Tap a day to see your assigned workout and log it.':'Activities and assigned workouts.'}</div>
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <button class="btn btn-ghost btn-sm" onclick="calMove(-1)">←</button>
      <strong style="color:var(--navy);font-size:16px">${CAL.toLocaleDateString('en-US',{month:'long',year:'numeric'})}</strong>
      <button class="btn btn-ghost btn-sm" onclick="calMove(1)">→</button>
    </div>
    <div class="cal-grid" style="margin-bottom:7px">${['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map(d=>`<div class="cal-head">${d}</div>`).join('')}</div>
    <div class="cal-grid">${cells}</div>
  </div>`;
}
function calMove(n){CAL.setMonth(CAL.getMonth()+n);go('calendar')}
function openDay(ds){
  const user=SESSION.username;
  const wos=workoutsOf(user).filter(w=>w.date===ds);
  const runs=entriesOf(user).filter(e=>e.date===ds);
  const linked={}; runs.forEach(e=>{if(e.workoutId)linked[e.workoutId]=e;});
  let body='';
  if(wos.length){
    body+=`<div class="page-sub" style="margin:0 0 8px;font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em">Assigned</div>`;
    body+=wos.map(w=>{const done=linked[w.id];const c=SPORTS[sportOf(w)].color;
      return `<div class="card" style="box-shadow:none;margin-bottom:10px;border-left:4px solid ${done?'var(--good)':c}">
        <div>${sportTag(sportOf(w))} <span class="ttag">${esc(w.type)}</span> ${done?'<span style="color:var(--good);font-weight:700;font-size:12px">✓ Completed</span>':''}</div>
        <div style="margin:8px 0;font-size:13.5px">${esc(w.description)}</div>
        ${done?`<div style="font-size:12.5px;color:var(--muted)">${(+done.distance||0)} ${distUnit(done)} · ${secsToHMS(done.dur)} · ${metricStr(done)}</div>
          <div class="form-actions"><button class="btn btn-ghost btn-sm" onclick="viewEntry('${done.id}')">View</button><button class="btn btn-navy btn-sm" onclick="closeModal();editEntry('${done.id}')">Edit</button></div>`
          :`<div class="form-actions"><button class="btn btn-primary btn-sm" onclick="completeWorkout('${w.id}')">✓ Complete this workout</button></div>`}
      </div>`;}).join('');
  }
  const freeRuns=runs.filter(e=>!e.workoutId);
  if(freeRuns.length){
    body+=`<div class="page-sub" style="margin:8px 0;font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.04em">Logged</div>`;
    body+=freeRuns.map(e=>`<div class="card" style="box-shadow:none;margin-bottom:8px"><div style="display:flex;justify-content:space-between;align-items:center;gap:8px">
      <div>${sportTag(sportOf(e))} <span style="font-size:13.5px">${(+e.distance||0)} ${distUnit(e)} · ${metricStr(e)}</span></div>
      <div class="inline-actions"><button class="btn btn-ghost btn-sm" onclick="viewEntry('${e.id}')">View</button><button class="btn btn-ghost btn-sm" onclick="closeModal();editEntry('${e.id}')">Edit</button></div></div></div>`).join('');
  }
  if(!wos.length && !freeRuns.length) body+=`<div class="empty" style="padding:20px">Nothing assigned for this day.</div>`;
  openModal(`<h3><span>${fmtDate(ds)}</span><button class="x" onclick="closeModal()">×</button></h3>${body}
    <div class="form-actions" style="margin-top:8px"><button class="btn btn-ghost btn-sm" onclick="logRun('${ds}')">+ Log an activity</button></div>`);
}

  const users=DB.get(KEY.users,[]);
  if(users.some(x=>x.username.toLowerCase()===u.toLowerCase())){toast('Username taken');return;}
  users.push({username:u,pass:await sha(p),name,role:val('nu_role')});
  DB.set(KEY.users,users);toast('User added ✓');go('users');
}
async function resetPass(u){
  const p=prompt('New password for @'+u+':');if(!p)return;
  const users=DB.get(KEY.users,[]);const i=users.findIndex(x=>x.username===u);
  users[i].pass=await sha(p);delete users[i].password;DB.set(KEY.users,users);toast('Password reset ✓');
}
function delUser(u){
  if(!confirm('Delete @'+u+' and all their data?'))return;
  DB.set(KEY.users,DB.get(KEY.users,[]).filter(x=>x.username!==u));
  DB.set(KEY.entries,allEntries().filter(e=>e.user!==u));
  DB.set(KEY.workouts,DB.get(KEY.workouts,[]).filter(w=>w.athlete!==u));
  toast('User deleted');go('users');
}
